[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build"

# Proxy /api/* to the Render backend.
# After deploying the backend, replace the placeholder URL below with your
# actual Render service URL (e.g. https://ig-trading-backend.onrender.com).
[[redirects]]
  from = "/api/*"
  to = "https://ig-trading-dashboard.onrender.com/api/:splat"
  status = 200
  force = true
